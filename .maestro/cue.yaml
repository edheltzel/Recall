subscriptions:
  - name: "red-team-after-research"
    event: agent.completed
    source_session: "*"
    filter:
      session_type: "research"
    prompt: prompts/red-team-validate.md
    enabled: true

  - name: "red-team-after-tests"
    event: agent.completed
    source_session: "*"
    filter:
      session_type: "test"
    prompt: prompts/red-team-validate.md
    enabled: true

settings:
  timeout_minutes: 30
  timeout_on_fail: break
  max_concurrent: 1
  queue_size: 10
